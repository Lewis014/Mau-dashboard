version: '3.8'

services:
  dashboard:
    build: .
    container_name: mau-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-n8n}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      APP_TOKEN: ${APP_TOKEN}
    networks:
      - bot-network

networks:
  bot-network:
    external: true
    name: contatech-aegis_bot-network
