version: '3.8'

services:
  dashboard:
    build: .
    container_name: mau-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-n8n}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      APP_TOKEN: ${APP_TOKEN}
      EXTRACT_MODEL: ${EXTRACT_MODEL:-claude-sonnet-4-6}
      CHATWOOT_HOST: ${CHATWOOT_HOST:-http://chatwoot_web:3000}
      CHATWOOT_ACCOUNT_ID: ${CHATWOOT_ACCOUNT_ID:-1}
      CHATWOOT_INBOX_ID: ${CHATWOOT_INBOX_ID:-1}
      CHATWOOT_API_TOKEN: ${CHATWOOT_API_TOKEN}
    networks:
      - bot-network

networks:
  bot-network:
    external: true
    name: contatech-aegis_bot-network
